name: Generate and Obfuscate Worker Script (CF Safe)

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - '明文源吗/**'

jobs:
  build-and-obfuscate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install javascript-obfuscator

      # =========================
      # 1. 生成 CF 安全构建脚本
      # =========================
      - name: Build obfuscation script
        run: |
          cat > build.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const JavaScriptObfuscator = require('javascript-obfuscator');

          const inputFile = '明文源吗';
          const outputFile = '少年你相信光吗';

          const sourcePath = path.join(process.cwd(), inputFile);

          if (!fs.existsSync(sourcePath)) {
            console.error('❌ 未找到源文件:', sourcePath);
            process.exit(1);
          }

          const code = fs.readFileSync(sourcePath, 'utf8');

          if (!code.trim()) {
            console.error('❌ 源文件为空');
            process.exit(1);
          }

          // =========================
          // ✔ Cloudflare Safe 混淆配置
          // =========================
          const options = {
            compact: true,

            // ❌ CF 禁用危险项（避免 global scope 报错）
            controlFlowFlattening: false,
            deadCodeInjection: false,
            debugProtection: false,

            // ✔ 字符串保护（核心）
            stringArray: true,
            stringArrayEncoding: ['rc4'],
            stringArrayThreshold: 0.85,

            stringArrayShuffle: true,
            stringArrayRotate: true,

            stringArrayWrappersCount: 2,
            stringArrayWrappersChainedCalls: false,

            // ✔ 标识符混淆
            identifierNamesGenerator: 'mangled-shuffled',
            renameGlobals: false,

            // ✔ 结构混淆（安全级）
            splitStrings: true,
            splitStringsChunkLength: 2,

            transformObjectKeys: true,

            numbersToExpressions: true,
            simplify: true,

            unicodeEscapeSequence: true,

            disableConsoleOutput: true,

            target: 'browser',
            ignoreImports: true
          };

          const output = JavaScriptObfuscator
            .obfuscate(code, options)
            .getObfuscatedCode();

          fs.writeFileSync(
            path.join(process.cwd(), outputFile),
            output,
            'utf8'
          );

          console.log('✔ 混淆完成:', outputFile);
          EOF

          node build.js

      # =========================
      # 2. 提交结果
      # =========================
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add '少年你相信光吗'

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "deploy: cloudflare safe obfuscation"
            git push
          fi
