name: Generate and Obfuscate Worker Script

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - '明文源吗'

jobs:
  build-and-obfuscate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install javascript-obfuscator terser

      - name: Build obfuscation script
        run: |
          cat > obfuscate.js << 'EOF'
          const JavaScriptObfuscator = require('javascript-obfuscator');
          const fs = require('fs');
          const path = require('path');

          const sourceFileName = '明文源吗';
          const outputFileName = '少年你相信光吗';
          const sourceFilePath = path.join(process.cwd(), sourceFileName);

          if (!fs.existsSync(sourceFilePath)) {
              console.error('错误：未找到源文件 ' + sourceFilePath);
              process.exit(1);
          }

          const originalCode = fs.readFileSync(sourceFilePath, 'utf8');

          if (!originalCode || originalCode.trim().length === 0) {
              console.error('错误：源文件为空');
              process.exit(1);
          }

          // ===== 工业级混淆配置 =====
          const obfuscationOptions = {
              compact: true,

              controlFlowFlattening: true,
              controlFlowFlatteningThreshold: 0.75,

              deadCodeInjection: true,
              deadCodeInjectionThreshold: 0.35,

              stringArray: true,
              stringArrayEncoding: ['rc4'],
              stringArrayThreshold: 0.9,

              stringArrayShuffle: true,
              stringArrayRotate: true,

              stringArrayWrappersCount: 3,
              stringArrayWrappersChainedCalls: true,
              stringArrayWrappersParametersMaxCount: 4,

              renameGlobals: true,
              identifierNamesGenerator: 'mangled-shuffled',

              renameProperties: false,

              splitStrings: true,
              splitStringsChunkLength: 2,

              transformObjectKeys: true,

              selfDefending: true,
              debugProtection: true,
              debugProtectionInterval: 4000,

              disableConsoleOutput: true,

              target: 'browser',

              numbersToExpressions: true,
              simplify: true,

              ignoreImports: true,
              unicodeEscapeSequence: true
          };

          const obfuscatedCode =
              JavaScriptObfuscator
                  .obfuscate(originalCode, obfuscationOptions)
                  .getObfuscatedCode();

          fs.writeFileSync(
              path.join(process.cwd(), outputFileName),
              obfuscatedCode,
              'utf8'
          );

          console.log('混淆完成：' + outputFileName);
          EOF

          node obfuscate.js

      - name: Commit and push result
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add '少年你相信光吗'

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: obfuscated build"
            git push
          fi
